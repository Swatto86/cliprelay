name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  linux-check-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (with rustfmt and clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (core + relay, deny warnings)
        run: cargo clippy -p cliprelay-core -p cliprelay-relay -- -D warnings

      - name: Cargo check
        run: cargo check

      - name: Core tests
        run: cargo test -p cliprelay-core

      - name: Relay E2E tests
        run: cargo test -p cliprelay-relay --test e2e_relay

  windows-client-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (with clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy (client, deny warnings)
        run: cargo clippy -p cliprelay-client -- -D warnings

      - name: Client tests
        run: cargo test -p cliprelay-client